name: Build Fabric Mod

on:
  push:
    branches: [ main, master, save-#1 ]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.8

      - name: Build
        run: gradle build --no-daemon

      - name: Upload mod jar
        uses: actions/upload-artifact@v4
        with:
          name: worldbox-fabric-jar
          path: build/libs/*.jar
